<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b10"/>
      <stop offset="100%" style="stop-color:#0e1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C5183A"/>
      <stop offset="100%" style="stop-color:#8B0A22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2236" stroke-width="1" opacity="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Glow blob -->
  <ellipse cx="600" cy="315" rx="280" ry="180" fill="#C5183A" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="524" y="130" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="552" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" text-anchor="middle" fill="white" letter-spacing="-1">N</text>

  <!-- Brand name -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#64748B" letter-spacing="6">NOCTURN.AI</text>

  <!-- Headline -->
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" text-anchor="middle" fill="#F0F2F8" letter-spacing="-2">Vídeos profissionais</text>
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" text-anchor="middle" fill="#C5183A" letter-spacing="-2">gerados por IA</text>

  <!-- Subline -->
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#64748B">Do roteiro ao MP4 em menos de 60 segundos</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0d14"/>
  <text x="600" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#364A62" letter-spacing="1">nocturn-ai.vercel.app</text>
</svg>
